# =============================================================================
# CONFIGURAÇÃO DE TEMA GLOBAL — MAZ Dashboard
# Identidade "Trançado das Amazônias": papel de galeria + 4 cores da marca
#   verde-folha · vermelho-urucum · laranja-sol · verde-água (rio)
# =============================================================================

[theme]
base                = "light"
primaryColor        = "#4F6A1E"        # Verde-folha — cor primária da marca MAZ
backgroundColor     = "#F6F1E7"        # Papel/argila — parede de galeria
secondaryBackgroundColor = "#FCFAF4"   # Cards e painéis laterais (papel claro)
textColor           = "#262419"        # Quase-preto com viés oliva
font                = "sans serif"

[server]
headless            = true
enableCORS          = false

[browser]
gatherUsageStats    = false
